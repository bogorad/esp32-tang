esphome:
  name: esp32-tang
  friendly_name: ESP32 Tang

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

web_server:
  port: 80

external_components:
  - source:
      type: local
      path: ../components
    components: [tang_server]

tang_server:
  id: tang_component
  initial_password: !secret tang_initial_password
  key_lifetime: 1h
  on_request:
    then:
      - homeassistant.event:
          event: esphome.tang_request
          data:
            path: !lambda "return path;"
            method: !lambda "return method;"
            status: !lambda "return status;"
